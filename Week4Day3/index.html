<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contact Form - Dynamic Input</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        select:focus {
            border-color: #5a7fca;
            outline: none;
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .radio-option {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .radio-option input[type="radio"] {
            margin: 0;
        }
        
        .dynamic-input {
            display: none;
            animation: slideDown 0.3s ease-in-out;
        }
        
        .dynamic-input.show {
            display: block;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .submit-btn {
            background-color: #5a7fca;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        
        .submit-btn:hover {
            background-color: #4a6fb0;
        }
        
        .submit-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>
            
            <div class="form-group">
                <label>Preferred Contact Method:</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="contactPhone" name="contactMethod" value="phone">
                        <label for="contactPhone">Phone</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="contactEmail" name="contactMethod" value="email">
                        <label for="contactEmail">Email</label>
                    </div>
                </div>
            </div>
            
            <!-- Dynamic Phone Input -->
            <div id="phoneInput" class="form-group dynamic-input">
                <label for="phone">Enter your phone number:</label>
                <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
            </div>
            
            <!-- Dynamic Email Input -->
            <div id="emailInput" class="form-group dynamic-input">
                <label for="email">Enter your email address:</label>
                <input type="email" id="email" name="email" placeholder="your.email@example.com">
            </div>
            
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="Enter your message here..." style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; box-sizing: border-box; resize: vertical;"></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>
    
    <script>
        // Get radio buttons and dynamic input containers
        const phoneRadio = document.getElementById('contactPhone');
        const emailRadio = document.getElementById('contactEmail');
        const phoneInput = document.getElementById('phoneInput');
        const emailInput = document.getElementById('emailInput');
        const submitBtn = document.querySelector('.submit-btn');
        
        // Add event listeners to radio buttons
        phoneRadio.addEventListener('change', function() {
            if (this.checked) {
                hideAllInputs();
                phoneInput.classList.add('show');
                updateSubmitButton();
            }
        });
        
        emailRadio.addEventListener('change', function() {
            if (this.checked) {
                hideAllInputs();
                emailInput.classList.add('show');
                updateSubmitButton();
            }
        });
        
        // Function to hide all dynamic inputs
        function hideAllInputs() {
            phoneInput.classList.remove('show');
            emailInput.classList.remove('show');
        }
        
        // Function to update submit button state
        function updateSubmitButton() {
            const name = document.getElementById('name').value.trim();
            const message = document.getElementById('message').value.trim();
            let contactInfo = '';
            
            if (phoneRadio.checked) {
                contactInfo = document.getElementById('phone').value.trim();
            } else if (emailRadio.checked) {
                contactInfo = document.getElementById('email').value.trim();
            }
            
            // Enable submit button only if all required fields are filled
            if (name && message && contactInfo && (phoneRadio.checked || emailRadio.checked)) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        }
        
        // Add event listeners to all form inputs for real-time validation
        document.getElementById('name').addEventListener('input', updateSubmitButton);
        document.getElementById('message').addEventListener('input', updateSubmitButton);
        document.getElementById('phone').addEventListener('input', updateSubmitButton);
        document.getElementById('email').addEventListener('input', updateSubmitButton);
        
        // Form submission handler
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                contactMethod: document.querySelector('input[name="contactMethod"]:checked').value,
                message: document.getElementById('message').value
            };
            
            if (formData.contactMethod === 'phone') {
                formData.phone = document.getElementById('phone').value;
            } else {
                formData.email = document.getElementById('email').value;
            }
            
            alert('Form submitted successfully!\n\n' +
                  'Name: ' + formData.name + '\n' +
                  'Contact Method: ' + formData.contactMethod + '\n' +
                  'Contact: ' + (formData.phone || formData.email) + '\n' +
                  'Message: ' + formData.message);
            
            // Reset form after submission
            this.reset();
            hideAllInputs();
            submitBtn.disabled = true;
        });
        
        // Initialize submit button as disabled
        submitBtn.disabled = true;
    </script>
</body>
</html>
