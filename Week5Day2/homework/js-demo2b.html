<!DOCTYPE html>
<html>
<head>  
<title>My Second Web Page</title>

<link rel="stylesheet" href="demo.css">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

<script>
    $(document).ready(function() {
       $("#btn").click(function(){
               $.getJSON('data.json')
                  .done(function(jqdata) {
                     populateTable(jqdata);
                  })
                  .fail(function() {
                     var jqdata = {
                        "title": "Calories Comparison of Popular Burgers",
                        "heading": "Type",
                        "head1" : "BigMac",
                        "head2": "Whopper",
                        "head3": "Dave's Double",
                        "head4": "Whataburger",
                        "subheadcal": "Calories",
                        "cal1" : "563",
                        "cal2": "677",
                        "cal3": "870",
                        "cal4": "590",
                        "subheadfat": "Fat",
                        "fat1" : "30gm",
                        "fat2": "40gm",
                        "fat3": "51gm",
                        "fat4": "25gm",
                        "subheadven": "Vendor",
                        "ven1" : "MacD",
                        "ven2": "Burger King",
                        "ven3": "Wendys",
                        "ven4": "Whataburger"
                     };
                     populateTable(jqdata);
                  });
               
               function populateTable(jqdata) {
                  $('table caption').text(jqdata.title);
                  
                  $('#showheading th:first-child').text(jqdata.heading);
                  $('#showheading th:nth-child(2)').text(jqdata.head1);
                  $('#showheading th:nth-child(3)').text(jqdata.head2);
                  $('#showheading th:nth-child(4)').text(jqdata.head3);
                  $('#showheading th:nth-child(5)').text(jqdata.head4);
                  
                  $('#showcalories td:first-child').text(jqdata.subheadcal);
                  $('#showcalories td:nth-child(2)').text(jqdata.cal1);
                  $('#showcalories td:nth-child(3)').text(jqdata.cal2);
                  $('#showcalories td:nth-child(4)').text(jqdata.cal3);
                  $('#showcalories td:nth-child(5)').text(jqdata.cal4);
                  
                  $('#showfat td:first-child').text(jqdata.subheadfat);
                  $('#showfat td:nth-child(2)').text(jqdata.fat1);
                  $('#showfat td:nth-child(3)').text(jqdata.fat2);
                  $('#showfat td:nth-child(4)').text(jqdata.fat3);
                  $('#showfat td:nth-child(5)').text(jqdata.fat4);
                  
                  $('#showven td:first-child').text(jqdata.subheadven);
                  $('#showven td:nth-child(2)').text(jqdata.ven1);
                  $('#showven td:nth-child(3)').text(jqdata.ven2);
                  $('#showven td:nth-child(4)').text(jqdata.ven3);
                  $('#showven td:nth-child(5)').text(jqdata.ven4);
               }
       });
    });
 </script>
</head> 	
<body>

<div id="container">

<header>My Web Site Brand</header>
<nav>
	<ul>
    <li><a href="js-demo2.html">Home</a></li>
    <li><a href="js-demo2b.html">About</a></li>
    <li><a href="js-demo2d.html">Gallery</a></li>
    <li><a href="js-demo2c.html">Contact</a></li>
	</ul>
</nav>

<main>
  <h1>My Second Heading</h1>
  <p>My Second paragraph.</p>

  <table>
    <caption></caption>
    <thead>
        <tr id="showheading">
            <th></th>
            <th></th>
            <th></th>
            <th></th>
            <th></th>
      </tr>
    </thead>
    <tbody>
        <tr id="showcalories">
            <td></td>
            <td></td> 
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr id="showfat">
            <td></td>
            <td></td> 
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </tbody>
    <tfoot>
        <tr id="showven">
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </tfoot>
    </table>

    <input type = "button" id = "btn" value = "Load Data" style="margin-top:20px;" />
</main>

<footer>&copy; Copyright 2020</footer>

</div>

</body>
</html>
